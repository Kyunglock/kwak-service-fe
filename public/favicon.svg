<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#16a34a"/>

  <!-- Compass outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#bbf7d0" stroke-width="2"/>

  <!-- N/S/E/W tick marks -->
  <line x1="32" y1="8" x2="32" y2="13" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="51" x2="32" y2="56" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="13" y2="32" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="32" x2="56" y2="32" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round"/>

  <!-- Compass needle - North (red, pointing up-right) -->
  <polygon points="32,14 36,32 32,30 28,32" fill="#ef4444"/>
  <!-- Compass needle - South (white, pointing down-left) -->
  <polygon points="32,50 36,32 32,34 28,32" fill="#ffffff"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#fbbf24"/>
</svg>

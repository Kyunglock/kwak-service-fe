server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker 내장 DNS(127.0.0.11)로 upstream을 런타임마다 재해석.
    # 이렇게 하지 않으면 api-gateway 컨테이너 재생성 시 IP가 바뀌어도
    # nginx가 기동 시 캐시한 옛 IP를 계속 사용해 502가 발생한다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location ~ ^/(portal|survey|advisor|market)/ {
        set $upstream_gateway api-gateway;
        proxy_pass http://$upstream_gateway:9000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/ {
        set $upstream_gateway api-gateway;
        proxy_pass http://$upstream_gateway:9000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

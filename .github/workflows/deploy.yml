name: Deploy Frontend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t inv-fe:latest .

      - name: Deploy container
        run: |
          docker stop inv-fe 2>/dev/null || true
          docker rm inv-fe 2>/dev/null || true
          docker run -d \
            --name inv-fe \
            --restart unless-stopped \
            -p 80:80 \
            inv-fe:latest

      - name: Clean up unused images
        run: docker image prune -f